services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # inside the compose network the database host is the service name
      DATABASE_URL: postgres://archcoach:archcoach@postgres:5432/archcoach
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: archcoach
      POSTGRES_PASSWORD: archcoach
      POSTGRES_DB: archcoach
    ports:
      # 5433 on the host to avoid clashing with a locally installed postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archcoach"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
